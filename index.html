<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musician Manager V5: Pro Tour</title>
    <style>
        :root {
            --bg: #0b0e14;
            --panel: #161b22;
            --accent: #58a6ff; /* Pro Blue */
            --success: #3fb950;
            --text: #c9d1d9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #status {
            background: #010409;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            border-bottom: 1px solid #30363d;
            font-weight: bold;
            color: var(--accent);
        }

        #output {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.6;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 14px;
        }

        #output b { color: #fff; font-size: 1.1em; }

        .controls-wrapper {
            background-color: var(--panel);
            padding: 25px;
            border-top: 1px solid #30363d;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            max-width: 1100px;
            margin: 0 auto;
        }

        button {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 6px;
            transition: 0.1s;
        }

        button:hover {
            background: #30363d;
            border-color: #8b949e;
        }

        button:active {
            background: var(--accent);
            color: #fff;
        }

        .tour-btn { background: #238636; color: #fff; border: none; }
        .tour-btn:hover { background: #2ea043; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="status"></div>

    <pre id="output"><b>V5: Pro Tour Edition</b>
Manage your hype, pick your venues, and don't go bankrupt.
Building hype is key before booking big venues.</pre>

    <div class="controls-wrapper">
        <div class="controls">
            <button onclick="createSong()">Write Song</button>
            <button onclick="practice()">Practice ($50)</button>
            <button onclick="releaseSong()">Release Music</button>
            <button onclick="showSongs()">Discography</button>
            <button class="tour-btn" onclick="startTour()">Book Tour Stop</button>
            <button onclick="updateStatus()">Sync Data</button>
            <button style="color:#f85149" onclick="resetGame()">Clear Career</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
