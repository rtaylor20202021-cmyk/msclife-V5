<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musician Manager V5.1</title>
    <style>
        :root {
            --bg: #0b0e14;
            --panel: #161b22;
            --accent: #58a6ff;
            --success: #238636;
            --text: #c9d1d9;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #status {
            background: #010409;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            border-bottom: 1px solid #30363d;
            font-family: monospace;
            color: var(--accent);
        }

        #output {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .controls-wrapper {
            background-color: var(--panel);
            padding: 20px;
            border-top: 1px solid #30363d;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            max-width: 1000px;
            margin: 0 auto;
        }

        button {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 12px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 6px;
        }

        button:hover { background: #30363d; }
        
        .primary { background: var(--accent); color: #fff; }
        .success-btn { background: var(--success); color: #fff; }
    </style>
</head>
<body>

    <div id="status"></div>

    <pre id="output"><b>V5.1: Venue Edition</b>
Perform single gigs to build cash, or save up for massive Tours.
Warning: Booking a Stadium without enough Fame will lead to bankruptcy!</pre>

    <div class="controls-wrapper">
        <div class="controls">
            <button onclick="createSong()">Write Song</button>
            <button onclick="practice()">Practice ($50)</button>
            <button onclick="releaseSong()">Release Single</button>
            <button class="primary" onclick="perform()">Perform Gig</button>
            <button class="success-btn" onclick="startTour()">Book Tour</button>
            <button onclick="showSongs()">Discography</button>
            <button style="border-color:#f85149" onclick="resetGame()">Reset</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
